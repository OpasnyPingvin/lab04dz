name: CI Windows

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Windows (MSVC, ${{ matrix.build_type }})
    runs-on: windows-latest
    
    strategy:
      matrix:
        build_type: [Debug, Release]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCMAKE_CXX_STANDARD=11
      
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel
      
      - name: Run hello_world
        run: ./build/hello_world_application/${{ matrix.build_type }}/hello_world.exe
      
      - name: Run solver tests
        shell: bash
        run: |
          echo "Test 1: x^2 - 2x + 1 = 0"
          echo "1 -2 1" | ./build/solver_application/${{ matrix.build_type }}/solver.exe
          echo ""
          echo "Test 2: x^2 - 3x + 2 = 0"
          echo "1 -3 2" | ./build/solver_application/${{ matrix.build_type }}/solver.exe
          echo ""
          echo "Test 3: x^2 + x + 1 = 0"
          echo "1 1 1" | ./build/solver_application/${{ matrix.build_type }}/solver.exe
